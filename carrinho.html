<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras - Projeto Dev Junior</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos do carrinho */
        .carrinho-container {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 30px;
            margin-top: 80px;
        }

        .carrinho-itens {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .carrinho-resumo {
            background-color: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .carrinho-resumo h3 {
            margin: 0 0 20px 0;
            color: #A93226;
        }

        .item-carrinho {
            background-color: white;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 20px;
            align-items: center;
        }

        .item-imagem {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            background: #f4f4f4;
        }

        .item-detalhes {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item-detalhes h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #333;
        }

        .item-detalhes p {
            margin: 0;
            color: #555;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .item-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .item-preco {
            font-weight: 700;
            color: #A93226;
            font-size: 1.1rem;
        }

        .item-quantidade {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-quantidade input {
            width: 60px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        .item-subtotal {
            font-weight: 700;
            color: #333;
        }

        .btn-remover {
            background: transparent;
            border: 1px solid #ccc;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #a93226;
            transition: all 0.2s ease;
            align-self: start;
        }

        .btn-remover:hover {
            background: #fcebea;
            border-color: #e74c3c;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .cart-table thead {
            background: #f9f7f5;
        }

        .cart-table th,
        .cart-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        .cart-table th {
            font-weight: 700;
            color: #4a3f35;
            font-size: 0.9rem;
        }

        .cart-table img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 12px;
            background: #f4f4f4;
        }

        .cart-table .cart-name {
            font-weight: 600;
            color: #333;
        }

        .cart-table .cart-desc {
            margin: 4px 0 0;
            font-size: 0.85rem;
            color: #666;
        }

        .cart-table .cart-qty {
            width: 100px;
        }

        .cart-table .cart-remove {
            text-align: center;
        }

        .cart-table .cart-remove button {
            padding: 8px 12px;
            border: 1px solid #ccc;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            color: #a93226;
            transition: background 0.2s ease;
        }

        .cart-table .cart-remove button:hover {
            background: #fcebea;
        }

        .resumo-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
            color: #4a3f35;
        }

        .resumo-total {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            font-size: 1.3rem;
            font-weight: 700;
            color: #A93226;
        }

        .resumo-botoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-finalizar {
            background-color: #A93226;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: background 0.2s ease;
        }

        .btn-finalizar:hover {
            background-color: #8E2800;
        }

        .btn-continuar {
            background-color: #f5b041;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .btn-continuar:hover {
            background-color: #e6a91a;
        }

        .carrinho-vazio {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .carrinho-vazio h2 {
            color: #A93226;
            margin-bottom: 12px;
        }

        @media (max-width: 960px) {
            .carrinho-container {
                grid-template-columns: 1fr;
            }

            .carrinho-resumo {
                position: static;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">Padaria Do Dev Junior</div>
            <nav>
                <a href="index.html">Início</a>
                <a href="historia.html">Nossa História</a>
                <a href="index.html#produtos">Fornada do Dia</a>
                <a href="carrinho.html" style="color: #f5b041; font-weight: bold;">🛒 Carrinho</a>
            </nav>
        </div>
    </header>

    <section style="padding: 80px 20px; max-width: 1100px; margin: 0 auto;">
        <h2 style="text-align: center; color: #A93226; margin-bottom: 40px; font-size: 2.5rem;">Seu Carrinho de Compras</h2>

        <div class="carrinho-container">
            <div class="carrinho-itens" id="cart-items">
                <!-- Lista de produtos adicionados (preenchida via JavaScript) -->
            </div>

            <aside class="carrinho-resumo" id="cart-summary"></aside>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Padaria Pão Quente. Assando desde o amanhecer.</p>
    </footer>

    <script>
        const CART_KEY = 'proj_dev_junior_cart_v1';

        function readCart() {
            try {
                const raw = localStorage.getItem(CART_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (err) {
                console.warn('Falha ao ler o carrinho:', err);
                return [];
            }
        }

        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }

        function formatMoney(value) {
            return value.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL',
            });
        }

        function calculateTotals(cart) {
            const subtotal = cart.reduce((acc, item) => acc + item.price * item.quantity, 0);
            return {
                subtotal,
                total: subtotal, // free shipping placeholder
            };
        }

        function renderCart() {
            const cart = readCart();
            const cartItemsEl = document.getElementById('cart-items');
            const cartSummaryEl = document.getElementById('cart-summary');

            cartItemsEl.innerHTML = '';
            cartSummaryEl.innerHTML = '';

            if (!cart.length) {
                cartItemsEl.innerHTML = `
                    <div class="carrinho-vazio">
                        <h2>Carrinho vazio</h2>
                        <p>Adicione produtos na página de "Fornada do Dia" para começar.</p>
                        <a class="btn-continuar" href="index.html#produtos">Ver Produtos</a>
                    </div>
                `;

                return;
            }

            const table = document.createElement('table');
            table.className = 'cart-table';

            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');

            cart.forEach((item) => {
                const row = document.createElement('tr');

                const productCell = document.createElement('td');
                productCell.innerHTML = `
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <img src="${item.image || 'https://via.placeholder.com/72?text=Produto'}" alt="${item.name}" />
                        <div>
                            <div class="cart-name">${item.name}</div>
                            <div class="cart-desc">${item.description || ''}</div>
                        </div>
                    </div>
                `;

                const priceCell = document.createElement('td');
                priceCell.textContent = formatMoney(item.price);

                const qtyCell = document.createElement('td');
                qtyCell.className = 'cart-qty';
                qtyCell.innerHTML = `
                    <input type="number" min="1" value="${item.quantity}" data-id="${item.id}" style="width: 70px; padding: 6px; border-radius: 8px; border: 1px solid #ddd; text-align: center;" />
                `;
                qtyCell.querySelector('input').addEventListener('change', (event) => {
                    const value = Math.max(1, Number(event.target.value) || 1);
                    event.target.value = value;
                    updateItemQuantity(item.id, value);
                });

                const subtotalCell = document.createElement('td');
                subtotalCell.textContent = formatMoney(item.price * item.quantity);
                subtotalCell.className = 'item-subtotal';
                subtotalCell.dataset.itemId = item.id;

                const removeCell = document.createElement('td');
                removeCell.className = 'cart-remove';
                const removeBtn = document.createElement('button');
                removeBtn.textContent = 'Remover';
                removeBtn.type = 'button';
                removeBtn.addEventListener('click', () => removeFromCart(item.id));
                removeCell.appendChild(removeBtn);

                row.append(productCell, priceCell, qtyCell, subtotalCell, removeCell);
                tbody.appendChild(row);
            });

            cartItemsEl.appendChild(table);

            const totals = calculateTotals(cart);

            cartSummaryEl.innerHTML = `
                <h3>Resumo do Pedido</h3>
                <div class="resumo-item"><span>Subtotal</span><span>${formatMoney(totals.subtotal)}</span></div>
                <div class="resumo-item"><span>Frete</span><span>Calculado no checkout</span></div>
                <div class="resumo-total"><span>Total</span><span>${formatMoney(totals.total)}</span></div>
                <div class="resumo-botoes">
                    <button class="btn-finalizar" id="btn-checkout">Finalizar Compra</button>
                    <a class="btn-continuar" href="index.html#produtos">Continuar Comprando</a>
                </div>
            `;

            document.getElementById('btn-checkout').addEventListener('click', () => {
                alert('Checkout não está disponível neste demo.');
            });
        }

        function updateItemQuantity(productId, quantity) {
            const cart = readCart();
            const item = cart.find((p) => p.id === productId);
            if (!item) return;
            item.quantity = quantity;
            saveCart(cart);
            refreshCartUI();
        }

        function removeFromCart(productId) {
            const cart = readCart().filter((p) => p.id !== productId);
            saveCart(cart);
            refreshCartUI();
        }

        function refreshCartUI() {
            renderCart();
        }

        function addToCart(product) {
            if (!product || !product.id || !product.name || !product.price) return;

            const cart = readCart();
            const existing = cart.find((p) => p.id === product.id);

            if (existing) {
                existing.quantity += product.quantity || 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: Number(product.price) || 0,
                    quantity: Number(product.quantity) || 1,
                    image: product.image || '',
                    description: product.description || '',
                });
            }

            saveCart(cart);
            refreshCartUI();
        }

        function addFromUrlParams() {
            const params = new URLSearchParams(window.location.search);
            if (!params.has('add')) return;

            const product = {
                id: params.get('add'),
                name: params.get('name') || 'Produto',
                price: Number(params.get('price')) || 0,
                quantity: Number(params.get('qty')) || 1,
                image: params.get('image') || '',
                description: params.get('description') || '',
            };

            addToCart(product);

            // Remove params to avoid re-adding on refresh
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        window.addEventListener('storage', () => {
            refreshCartUI();
        });

        window.addToCart = addToCart;

        document.addEventListener('DOMContentLoaded', () => {
            addFromUrlParams();
            renderCart();
        });
    </script>

</body>
</html>
